<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIPM College Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8e1d78;
            --primary-light: #b8369e;
            --primary-dark: #6a1459;
            --primary-glow: rgba(142, 29, 120, 0.15);
            --bg: #0f0a0e;
            --surface: #1a1018;
            --surface2: #231828;
            --text: #f0e8ef;
            --text-muted: #9d8a9a;
            --border: rgba(142, 29, 120, 0.2);
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 24px rgba(142, 29, 120, 0.4);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            object-fit: contain;
            background: white;
            padding: 3px;
            flex-shrink: 0;
        }

        .header-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: white;
            letter-spacing: 0.3px;
        }

        .header-info p {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.75);
            margin-top: 2px;
            font-weight: 300;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px #4ade80;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* Chat area */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 4px;
        }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 32px 16px;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            padding: 6px;
            margin: 0 auto 16px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 32px var(--primary-glow);
            display: block;
            object-fit: contain;
        }

        .welcome h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--primary-light);
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 300px;
            margin: 0 auto 20px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 420px;
            margin: 0 auto;
        }

        .suggestion-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .suggestion-chip:hover {
            background: var(--primary-glow);
            border-color: var(--primary);
            color: var(--primary-light);
            transform: translateY(-1px);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeInUp 0.35s ease;
            max-width: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            align-self: flex-end;
        }

        .avatar.bot-avatar {
            background: white;
            padding: 2px;
            border: 2px solid var(--primary);
            overflow: hidden;
        }

        .avatar.bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .avatar.user-avatar {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .bubble {
            max-width: calc(100% - 80px);
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.88rem;
            line-height: 1.65;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message.bot .bubble h1,
        .message.bot .bubble h2,
        .message.bot .bubble h3 {
            color: var(--primary-light);
            margin: 10px 0 6px;
            font-size: 1rem;
        }

        .message.bot .bubble ul,
        .message.bot .bubble ol {
            padding-left: 18px;
            margin: 6px 0;
        }

        .message.bot .bubble li {
            margin: 4px 0;
        }

        .message.bot .bubble strong {
            color: var(--primary-light);
        }

        .message.bot .bubble p {
            margin: 4px 0;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 10px;
            animation: fadeInUp 0.3s ease;
        }

        .typing-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input area */
        #input-area {
            padding: 14px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            padding: 6px 0;
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(142, 29, 120, 0.5);
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        #sendBtn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .input-hint {
            text-align: center;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header { padding: 12px 16px; }
            .header-info h1 { font-size: 1rem; }
            #chat { padding: 16px 10px 10px; }
            .bubble { max-width: calc(100% - 60px); font-size: 0.84rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <img src="https://www.kipm.edu.in/Images/logo.png" alt="KIPM Logo" class="header-logo"
             onerror="this.style.display='none'">
        <div class="header-info">
            <h1>KIPM College Assistant</h1>
            <p>Ask about admissions, policies, courses & more</p>
        </div>
        <div class="status-dot"></div>
    </div>

    <!-- Chat -->
    <div id="chat">
        <div class="welcome">
            <img src="https://www.kipm.edu.in/Images/logo.png" alt="KIPM" class="welcome-icon"
                 onerror="this.style.background='var(--primary)';this.style.padding='12px'">
            <h2>Hello! I'm KIPM Assistant</h2>
            <p>Ask me anything about college policies, admissions, courses, or campus life.</p>
            <div class="suggestions">
                <button class="suggestion-chip" onclick="askSuggestion(this)">📋 Admission process</button>
                <button class="suggestion-chip" onclick="askSuggestion(this)">📚 Available courses</button>
                <button class="suggestion-chip" onclick="askSuggestion(this)">🏛️ College facilities</button>
                <button class="suggestion-chip" onclick="askSuggestion(this)">📅 Fee structure</button>
                <button class="suggestion-chip" onclick="askSuggestion(this)">📞 Contact details</button>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask about KIPM college..."
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <p class="input-hint">Press Enter or click send · Powered by KIPM AI</p>
    </div>

    <script>
        const chat = document.getElementById("chat");

        function askSuggestion(btn) {
            document.getElementById("userInput").value = btn.textContent.replace(/^[^\w]+/, '').trim();
            sendMessage();
        }

        function addMessage(text, sender) {
            const msg = document.createElement("div");
            msg.className = `message ${sender}`;

            const avatar = document.createElement("div");
            avatar.className = `avatar ${sender}-avatar`;

            if (sender === "bot") {
                avatar.innerHTML = `<img src="https://www.kipm.edu.in/Images/logo.png" alt="Bot"
                    onerror="this.parentElement.textContent='AI'">`;
            } else {
                avatar.textContent = "You";
                avatar.style.fontSize = "0.6rem";
            }

            const bubble = document.createElement("div");
            bubble.className = "bubble";

            if (sender === "bot") {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.className = "typing";
            typing.id = "typing";
            typing.innerHTML = `
                <div class="avatar bot-avatar">
                    <img src="https://www.kipm.edu.in/Images/logo.png" alt="Bot"
                        onerror="this.parentElement.textContent='AI'">
                </div>
                <div class="typing-bubble">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            // Remove welcome screen on first message
            const welcome = document.querySelector(".welcome");
            if (welcome) welcome.remove();

            addMessage(message, "user");
            input.value = "";
            input.focus();

            showTyping();

            try {
                const response = await fetch("fetch("https://http://127.0.0.1:500/chat")", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: message})
                });

                const data = await response.json();
                removeTyping();
                addMessage(data.reply, "bot");
            } catch (err) {
                removeTyping();
                addMessage("Sorry, I'm having trouble connecting. Please make sure the server is running.", "bot");
            }

            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
